<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Room - UniLearn</title>
  <link rel="stylesheet" href="../css/live-room.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
  <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
</head>
<body data-title-key="liveRoom.pageTitle">
  <header class="topbar">
    <div class="topbar-left">
      <button class="mobile-menu-btn" id="mobileMenuBtn" type="button" data-i18n-aria="common.openMenu">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>

      <span class="logo-mark">U/</span>

      <div class="live-badge">
        <span class="dot"></span>
        <span data-i18n="liveRoom.liveBadge">Live</span>
      </div>

      <span class="session-title" id="sessionTitle">Live Session</span>
    </div>

    <div class="topbar-right">
      <button class="view-mode-btn" id="refreshBtn" type="button" style="margin-right: 10px; width: 34px; height: 34px;" title="تحديث / إعادة اتصال">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <polyline points="23 4 23 10 17 10"></polyline>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
        </svg>
      </button>

      <div class="viewer-count">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
          <circle cx="9" cy="7" r="4"></circle>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
        </svg>
        <span id="viewerCount">1</span>
        <span data-i18n="liveRoom.watching">watching</span>
      </div>

      <div class="timer" id="sessionTimer">00:00:00</div>
    </div>
  </header>

  <div class="room-layout">
    <section class="video-stage" id="videoStage">
      <div class="screenshare-label" id="screenShareLabel" hidden data-i18n="liveRoom.screenShareLabel">Screen share</div>

      <div class="video-grid single-speaker" id="videoGrid">
        <article class="video-slot" id="slot-local" data-slot="local">
          <div class="media-layer" id="slot-local-media"></div>
          <div class="avatar-placeholder" id="localAvatar">S</div>
          <div class="slot-label">
            <span class="slot-role" data-i18n="liveRoom.hostLabel">Host</span>
            <span id="localName">You</span>
          </div>
          <div class="mic-indicator" id="localMicIcon">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
              <line x1="12" y1="19" x2="12" y2="23"></line>
            </svg>
          </div>
        </article>

        <article class="video-slot" id="slot-remote" data-slot="remote">
          <div class="media-layer" id="slot-remote-media"></div>
          <div class="avatar-placeholder" id="remoteAvatar">?</div>
          <div class="slot-label">
            <span class="slot-role" data-i18n="liveRoom.cohostLabel">Co-host</span>
            <span id="remoteName">Waiting...</span>
          </div>
          <div class="mic-indicator" id="remoteMicIcon">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
              <line x1="12" y1="19" x2="12" y2="23"></line>
            </svg>
          </div>
        </article>
      </div>

      <p class="stage-hint" id="singleSpeakerHint" data-i18n="liveRoom.singleSpeakerHint">
        Tap the mini window to switch the focused speaker.
      </p>
    </section>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-tabs">
        <button class="tab-btn active" type="button" data-tab="chat">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
          </svg>
          <span data-i18n="liveRoom.chatTab">Chat</span>
        </button>

        <button class="tab-btn" type="button" data-tab="participants">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
          </svg>
          <span data-i18n="liveRoom.peopleTab">People</span>
        </button>

        <button class="tab-btn" type="button" data-tab="hands">
          <span data-i18n="liveRoom.handsTab">Hands</span>
          <span class="hands-count" id="handsCount">0</span>
        </button>

        <button class="tab-btn" type="button" data-tab="requests" style="display: none;">
          <span data-i18n="liveRoom.requestsTab">Requests</span>
          <span class="hands-count" id="requestsCount">0</span>
        </button>
      </div>

      <div class="tab-panel active" id="tab-chat">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
          <textarea class="chat-input" id="chatInput" rows="1" placeholder="Send a message..." data-i18n-placeholder="liveRoom.messagePlaceholder"></textarea>
          <button class="send-btn" id="sendBtn" type="button" aria-label="Send message">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>

      <div class="tab-panel" id="tab-participants">
        <div class="participants-list" id="participantsList"></div>
      </div>

      <div class="tab-panel" id="tab-hands">
        <div class="hands-panel" id="handsPanel">
          <div class="hands-empty" id="handsEmpty">
            <span class="hands-empty-mark">Hand</span>
            <span data-i18n="liveRoom.noRaisedHands">No raised hands</span>
          </div>
        </div>
      </div>

      <div class="tab-panel" id="tab-requests">
        <div class="hands-panel" id="requestsPanel">
          <div class="hands-empty" id="requestsEmpty">
            <span class="hands-empty-mark">
              <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line></svg>
            </span>
            <span data-i18n="liveRoom.noSpeakRequests">No speak requests</span>
          </div>
        </div>
      </div>
    </aside>

    <div class="control-bar">
      <div class="view-modes">
        <button class="view-mode-btn" id="viewDual" type="button" data-i18n-title="liveRoom.dualViewTitle">
          <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="2" y="3" width="9" height="18" rx="1"></rect>
            <rect x="13" y="3" width="9" height="18" rx="1"></rect>
          </svg>
        </button>
        <button class="view-mode-btn active" id="viewSingle" type="button" data-i18n-title="liveRoom.singleViewTitle">
          <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="2" y="3" width="20" height="18" rx="1"></rect>
          </svg>
        </button>
        <button class="view-mode-btn" id="viewScreen" type="button" data-i18n-title="liveRoom.screenViewTitle">
          <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="2" y="3" width="14" height="18" rx="1"></rect>
            <rect x="18" y="3" width="4" height="18" rx="1"></rect>
          </svg>
        </button>
      </div>

      <button class="ctrl-btn off" id="toggleMic" type="button">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
          <line x1="12" y1="19" x2="12" y2="23"></line>
        </svg>
        <span data-i18n="liveRoom.mic">Mic</span>
      </button>

      <button class="ctrl-btn off" id="toggleCam" type="button">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
          <polygon points="23 7 16 12 23 17 23 7"></polygon>
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
        </svg>
        <span data-i18n="liveRoom.camera">Camera</span>
      </button>

      <button class="ctrl-btn" id="toggleScreen" type="button">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="2" y="3" width="20" height="14" rx="2"></rect>
          <line x1="8" y1="21" x2="16" y2="21"></line>
          <line x1="12" y1="17" x2="12" y2="21"></line>
        </svg>
        <span data-i18n="liveRoom.share">Share</span>
      </button>
      
      <button class="ctrl-btn" id="reqBroadcastBtn" type="button" style="display: none;">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14v-4z"></path>
          <rect x="3" y="6" width="12" height="12" rx="2" ry="2"></rect>
        </svg>
        <span data-i18n="liveRoom.reqBroadcast">طلب البث</span>
      </button>

      <div class="ctrl-divider"></div>

      <button class="ctrl-btn hand-btn" id="raiseHandBtn" type="button">
        <span class="hand-icon-label">Hand</span>
        <span data-i18n="liveRoom.hand">Hand</span>
      </button>

      <div class="ctrl-divider"></div>

      <button class="end-btn" id="endBtn" type="button" data-i18n="liveRoom.leave">Leave</button>
    </div>
  </div>

  <div class="notification-stack" id="notifStack"></div>

  <script src="../js/app-shell.js"></script>
  <script src="../js/live-room.js"></script>
</body>
</html>
