<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recorded Lectures - UniLearn</title>
  <link rel="stylesheet" href="../css/vod.css">
</head>
<body data-title-key="vod.pageTitle">
  <nav class="sidenav">
    <div class="nav-brand">
      <div class="brand-name" data-i18n="common.brand">UniLearn</div>
      <div class="brand-sub" data-i18n="common.brandSub">Academic Platform</div>
    </div>

    <div class="nav-links">
      <span class="nav-section-label" data-i18n="nav.mainSection">Main</span>

      <a href="/dashboard" class="nav-link">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
        </svg>
        <span data-i18n="nav.dashboard">Dashboard</span>
      </a>

      <a href="/curriculum" class="nav-link">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
        </svg>
        <span data-i18n="nav.curriculum">Curriculum</span>
      </a>

      <a href="/vod" class="nav-link active">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
          <polygon points="23 7 16 12 23 17 23 7"></polygon>
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
        </svg>
        <span data-i18n="nav.recordedLectures">Recorded Lectures</span>
        <span class="nav-badge" id="navLectureCount">0</span>
      </a>

      <a href="/live" class="nav-link">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="2"></circle>
          <path d="M16.24 7.76a6 6 0 0 1 0 8.49m-8.48-.01a6 6 0 0 1 0-8.49m11.31-2.82a10 10 0 0 1 0 14.14m-14.14 0a10 10 0 0 1 0-14.14"></path>
        </svg>
        <span data-i18n="nav.liveRoom">Live Room</span>
      </a>

      <a href="/quizzes" class="nav-link">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M9 11.75 11.25 14 15 10.25"></path>
          <path d="M20 12.5A7.5 7.5 0 1 1 12.5 5"></path>
          <path d="M15 3h6v6"></path>
          <path d="M21 3 12.75 11.25"></path>
        </svg>
        <span data-i18n="nav.quizzes">Quizzes</span>
      </a>
    </div>

    <div class="nav-footer">
      <div class="user-chip" id="userChip">
        <div class="user-avatar" data-user-avatar>S</div>
        <div>
          <div class="user-info-name" data-user-name>Student Name</div>
          <div class="user-info-role" data-user-role>Student</div>
        </div>
      </div>
    </div>
  </nav>

  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" id="mobileMenuBtn" type="button" data-i18n-aria="common.openMenu">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>

        <div class="page-title-block">
          <span class="page-eyebrow" data-i18n="vod.pageEyebrow">Lecture Library</span>
          <h1 class="page-title" data-i18n="vod.pageHeading">Recorded Lectures</h1>
        </div>

        <span class="vod-count" id="vodCount">Loading...</span>
      </div>

      <div class="topbar-right">
        <div class="search-field">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="text" id="vodSearch" placeholder="Search lectures, topics..." data-i18n-placeholder="vod.searchPlaceholder">
        </div>

        <select class="sort-select" id="sortSelect" data-i18n-aria="vod.sortLabel">
          <option value="newest" data-i18n="vod.sort.newest">Newest first</option>
          <option value="oldest" data-i18n="vod.sort.oldest">Oldest first</option>
          <option value="popular" data-i18n="vod.sort.popular">Most watched</option>
          <option value="duration-asc" data-i18n="vod.sort.shortest">Shortest</option>
          <option value="duration-desc" data-i18n="vod.sort.longest">Longest</option>
          <option value="az" data-i18n="vod.sort.az">A to Z</option>
        </select>

        <div class="layout-toggle">
          <button class="lt-btn active" id="gridBtn" type="button" data-i18n-title="vod.gridViewTitle">
            <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3" y="3" width="7" height="7"></rect>
              <rect x="14" y="3" width="7" height="7"></rect>
              <rect x="3" y="14" width="7" height="7"></rect>
              <rect x="14" y="14" width="7" height="7"></rect>
            </svg>
          </button>
          <button class="lt-btn" id="listBtn" type="button" data-i18n-title="vod.listViewTitle">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
              <line x1="8" y1="6" x2="21" y2="6"></line>
              <line x1="8" y1="12" x2="21" y2="12"></line>
              <line x1="8" y1="18" x2="21" y2="18"></line>
              <line x1="3" y1="6" x2="3.01" y2="6"></line>
              <line x1="3" y1="12" x2="3.01" y2="12"></line>
              <line x1="3" y1="18" x2="3.01" y2="18"></line>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <div class="vod-body">
      <aside class="filter-sidebar">
        <div class="filter-section">
          <span class="filter-label" data-i18n="vod.filters.subject">Subject</span>
          <div class="filter-chip-group" id="subjectChips"></div>
        </div>

        <div class="filter-section">
          <span class="filter-label" data-i18n="vod.filters.instructor">Instructor</span>
          <div class="filter-chip-group" id="instructorChips"></div>
        </div>

        <div class="filter-section">
          <span class="filter-label" data-i18n="vod.filters.duration">Duration</span>
          <div class="filter-range">
            <input type="range" id="durationRange" min="20" max="180" step="5" value="180">
            <div class="filter-range-labels">
              <span>20m</span>
              <span id="durationLabel">Any</span>
            </div>
          </div>
        </div>

        <div class="filter-section">
          <span class="filter-label" data-i18n="vod.filters.status">Status</span>
          <label class="filter-checkbox">
            <input type="checkbox" id="filterWatched" checked>
            <span data-i18n="vod.filters.showWatched">Show watched</span>
          </label>
          <label class="filter-checkbox">
            <input type="checkbox" id="filterNew">
            <span data-i18n="vod.filters.showNewOnly">Show new only</span>
          </label>
        </div>
      </aside>

      <section class="vod-area" id="vodArea">
        <div id="featuredStrip"></div>
        <div id="vodSections"></div>
        <div class="pagination" id="pagination"></div>
      </section>
    </div>
  </main>

  <div class="player-overlay" id="playerOverlay" aria-hidden="true">
    <div class="player-box">
      <div class="player-screen" id="playerScreen"></div>

      <div class="player-controls">
        <div class="player-title-row">
          <div class="player-title" id="playerTitle">Lecture title</div>
          <button class="player-close" id="playerClose" type="button" aria-label="Close player">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>

        <div class="player-seek-wrap">
          <span class="player-time" id="playerCurrent">0:00</span>
          <input class="player-seek" type="range" id="playerSeek" min="0" max="100" value="0">
          <span class="player-time" id="playerTotal">0:00</span>
        </div>

        <div class="player-btn-row">
          <button class="p-btn" id="skipBack" type="button" aria-label="Back ten seconds">
            <svg width="15" height="15" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"></path>
            </svg>
          </button>

          <button class="p-btn play-pause" id="playPause" type="button" aria-label="Play or pause">
            <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
          </button>

          <button class="p-btn" id="skipFwd" type="button" aria-label="Forward ten seconds">
            <svg width="15" height="15" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"></path>
            </svg>
          </button>

          <button class="p-speed" id="speedBtn" type="button">1x</button>

          <div class="p-vol">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            </svg>
            <input type="range" id="volSlider" min="0" max="100" value="80">
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/app-shell.js"></script>
  <script src="../js/vod.js"></script>
</body>
</html>
