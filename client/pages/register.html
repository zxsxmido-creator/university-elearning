<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - UniLearn</title>
  <link rel="stylesheet" href="../css/login.css">
</head>
<body>
  <main class="login-shell">
    <section class="login-card">
      <div class="login-eyebrow">UniLearn</div>
      <h1 class="login-title">Create an Account</h1>
      <p class="login-copy">Join the learning workspace to get started.</p>

      <form id="registerForm" class="login-form">
        <label class="login-label" for="name">Full Name</label>
        <input class="login-input" id="name" name="name" type="text" required placeholder="Enter your full name">

        <label class="login-label" for="email" style="margin-top: 15px;">Email Address</label>
        <input class="login-input" id="email" name="email" type="email" required placeholder="Enter your email">

        <label class="login-label" for="password" style="margin-top: 15px;">Password</label>
        <input class="login-input" id="password" name="password" type="password" required placeholder="Create a password">

        <button class="login-btn" type="submit" style="margin-top: 20px;">Create Account</button>
      </form>
      
      <p style="margin-top: 15px; text-align: center; font-size: 12px; color: var(--text-muted);">
        Already have an account? <a href="login.html" style="color: var(--accent-primary); text-decoration: none;">Login here</a>
      </p>
    </section>
  </main>

  <script src="../js/register.js"></script>
</body>
</html>
