<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quizzes - UniLearn</title>
  <link rel="stylesheet" href="../css/app-shell.css">
  <link rel="stylesheet" href="../css/quizzes.css">
</head>
<body data-title-key="quizzes.pageTitle">
  <nav class="sidenav">
    <div class="nav-brand">
      <div class="brand-name" data-i18n="common.brand">UniLearn</div>
      <div class="brand-sub" data-i18n="common.brandSub">Academic Platform</div>
    </div>

    <div class="nav-links">
      <span class="nav-section-label" data-i18n="nav.mainSection">Main</span>

      <a href="/dashboard" class="nav-link">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
        </svg>
        <span data-i18n="nav.dashboard">Dashboard</span>
      </a>

      <a href="/curriculum" class="nav-link">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
        </svg>
        <span data-i18n="nav.curriculum">Curriculum</span>
      </a>

      <a href="/vod" class="nav-link">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
          <polygon points="23 7 16 12 23 17 23 7"></polygon>
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
        </svg>
        <span data-i18n="nav.recordedLectures">Recorded Lectures</span>
      </a>

      <a href="/live" class="nav-link">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="2"></circle>
          <path d="M16.24 7.76a6 6 0 0 1 0 8.49m-8.48-.01a6 6 0 0 1 0-8.49m11.31-2.82a10 10 0 0 1 0 14.14m-14.14 0a10 10 0 0 1 0-14.14"></path>
        </svg>
        <span data-i18n="nav.liveRoom">Live Room</span>
      </a>

      <a href="/quizzes" class="nav-link active">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M9 11.75 11.25 14 15 10.25"></path>
          <path d="M20 12.5A7.5 7.5 0 1 1 12.5 5"></path>
          <path d="M15 3h6v6"></path>
          <path d="M21 3 12.75 11.25"></path>
        </svg>
        <span data-i18n="nav.quizzes">Quizzes</span>
        <span class="nav-badge" id="quizNavCount">5</span>
      </a>
    </div>

    <div class="nav-footer">
      <div class="user-chip" id="userChip">
        <div class="user-avatar" data-user-avatar>S</div>
        <div>
          <div class="user-info-name" data-user-name>Student Name</div>
          <div class="user-info-role" data-user-role>Student</div>
        </div>
      </div>
    </div>
  </nav>

  <main class="main">
    <header class="topbar">
      <button class="mobile-menu-btn" id="mobileMenuBtn" type="button" data-i18n-aria="common.openMenu">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>

      <div class="page-greeting">
        <span class="greeting-label" id="quizzesEyebrow">Assessment Center</span>
        <span class="greeting-name" id="quizzesHeading">Ready for your next quiz?</span>
      </div>

      <div class="topbar-actions">
        <div class="search-bar">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="text" id="quizSearch" placeholder="Search quizzes..." data-i18n-placeholder="quizzes.searchPlaceholder">
        </div>

        <button class="notif-bell" id="notifBellBtn" type="button" data-i18n-aria="common.openNotifications">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg>
          <span class="badge" id="notifBadge">3</span>
        </button>
      </div>
    </header>

    <div class="notif-dropdown" id="notifDropdown">
      <div class="notif-panel-header">
        <span class="notif-panel-title" data-i18n="common.notifications">Notifications</span>
        <button class="mark-read" id="markAllRead" type="button" data-i18n="common.markAllRead">Mark all read</button>
      </div>
      <div class="notif-items" id="dropdownNotifs"></div>
    </div>

    <div class="page-body">
      <div class="quiz-overview-row" id="quizOverviewRow"></div>

      <div class="quizzes-layout">
        <section class="quizzes-main">
          <div class="quizzes-panel">
            <div class="section-header">
              <h2 class="section-title" data-i18n="quizzes.sectionTitle">Quizzes</h2>
              <span class="panel-note" id="quizPanelNote">Practice and complete your latest checks.</span>
            </div>

            <div class="quiz-tabs" id="quizTabs">
              <button class="quiz-tab active" type="button" data-tab="pending">
                <span id="pendingTabLabel">Pending Quizzes</span>
                <span class="quiz-tab-count" id="pendingTabCount">0</span>
              </button>
              <button class="quiz-tab" type="button" data-tab="completed">
                <span id="completedTabLabel">Completed Quizzes</span>
                <span class="quiz-tab-count" id="completedTabCount">0</span>
              </button>
            </div>

            <div class="quiz-grid" id="quizGrid"></div>
          </div>
        </section>

        <aside class="leaderboard-panel">
          <div class="section-header">
            <h2 class="section-title" data-i18n="quizzes.leaderboardTitle">Leaderboard</h2>
            <span class="leaderboard-period" id="leaderboardPeriod">Weekly ranking</span>
          </div>
          <div class="leaderboard-list" id="leaderboardList"></div>
        </aside>
      </div>
    </div>
  </main>

  <div class="quiz-modal-overlay" id="quizModal" aria-hidden="true">
    <div class="quiz-modal" role="dialog" aria-modal="true" aria-labelledby="quizModalTitle">
      <div class="quiz-modal-header">
        <div>
          <div class="quiz-modal-eyebrow" id="quizModalEyebrow">Quiz attempt</div>
          <h3 class="quiz-modal-title" id="quizModalTitle">Quiz</h3>
        </div>
        <button class="quiz-close" id="quizCloseBtn" type="button" aria-label="Close quiz modal">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <div class="quiz-progress-track">
        <div class="quiz-progress-fill" id="quizProgressFill"></div>
      </div>

      <div class="quiz-modal-body" id="quizModalBody"></div>

      <div class="quiz-modal-footer" id="quizModalFooter">
        <button class="secondary-btn" id="quizPrevBtn" type="button">Previous</button>
        <div class="quiz-modal-footer-actions">
          <button class="secondary-btn" id="quizNextBtn" type="button">Next</button>
          <button class="primary-btn" id="quizSubmitBtn" type="button">Submit quiz</button>
          <button class="primary-btn" id="quizDoneBtn" type="button">Done</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/app-shell.js"></script>
  <script src="../js/quizzes.js"></script>
</body>
</html>
