<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - UniLearn</title>
  <link rel="stylesheet" href="../css/login.css">
</head>
<body>
  <main class="login-shell">
    <section class="login-card">
      <div class="login-eyebrow">UniLearn</div>
      <h1 class="login-title">Welcome back</h1>
      <p class="login-copy">Enter your display name to continue into the learning workspace.</p>

      <form id="loginForm" class="login-form">
        <label class="login-label" for="displayName">Display Name</label>
        <input class="login-input" id="displayName" name="displayName" type="text" maxlength="40" placeholder="Student Name" required>
        <button class="login-btn" type="submit">Continue to Dashboard</button>
      </form>
    </section>
  </main>

  <script src="../js/login.js"></script>
</body>
</html>
