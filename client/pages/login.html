<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - UniLearn</title>
  <link rel="stylesheet" href="../css/login.css">
</head>
<body>
  <main class="login-shell">
    <section class="login-card">
      <div class="login-eyebrow">UniLearn</div>
      <h1 class="login-title">Welcome back</h1>
      <p class="login-copy">Enter your display name to continue into the learning workspace.</p>

      <form id="loginForm" class="login-form">
  <label class="login-label" for="email">Email Address</label>
  <input class="login-input" id="email" name="email" type="email" required placeholder="Enter your email">

  <label class="login-label" for="password" style="margin-top: 15px;">Password</label>
  <input class="login-input" id="password" name="password" type="password" required placeholder="Enter your password">

  <button class="login-btn" type="submit" style="margin-top: 20px;">Login to Dashboard</button>
</form>
<p style="margin-top: 15px; text-align: center; font-size: 12px; color: var(--text-muted);">
        Don't have an account? <a href="/register" style="color: var(--accent-primary); text-decoration: none;">Sign up here</a>
      </p>
    </section>
  </main>

  <script src="../js/login.js"></script>
</body>
</html>
